spring.application.name=sims-legacies

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/simslegacies}
spring.datasource.username=${DB_USERNAME:simslegacies}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.locations=classpath:db/migration

# Cloudflare R2 (S3-compatible)
r2.endpoint=${R2_ENDPOINT}
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}
r2.bucket=${R2_BUCKET:sims-legacies}
